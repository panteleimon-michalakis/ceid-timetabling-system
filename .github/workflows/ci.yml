name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — Maven tests (PostgreSQL 16)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timetable
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ceid_admin
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ceid_timetable
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ceid_admin -d ceid_timetable"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        env:
          DB_PASSWORD: ci_password
        run: |
          chmod +x mvnw
          ./mvnw -B test

  frontend:
    name: Frontend — TypeScript & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Production build
        run: npm run build

      # Ενημερωτικό προς το παρόν (υπάρχουν γνωστά no-explicit-any ευρήματα).
      # Όταν καθαρίσουν (task #16), αφαίρεσε το "|| true" για να γίνει blocking.
      - name: ESLint (non-blocking)
        run: npx eslint src || true
