# ===== CEID Timetable Configuration =====

spring.application.name=ceid-timetable
server.port=8080

# ===== PostgreSQL Database =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ceid_timetable}
spring.datasource.username=${DB_USERNAME:ceid_admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Server =====
spring.jpa.open-in-view=false

# ===== JWT =====
# Ορίσου στο περιβάλλον ως: setx JWT_SECRET "your-secret-here"  (Windows)
# ή export JWT_SECRET="your-secret-here"  (Linux/macOS)
# Το default χρησιμοποιείται ΜΟΝΟ για τοπική ανάπτυξη (dev).
# ΣΕ ΠΑΡΑΓΩΓΗ: πάντα ορίζε το JWT_SECRET env var, ΜΗΝ αφήνεις default!
jwt.secret=${JWT_SECRET:ceid-timetable-dev-secret-key-32-chars-min}

# ===== Timefold Solver =====
spring.autoconfigure.exclude=ai.timefold.solver.spring.boot.autoconfigure.TimefoldSolverAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
timefold.solver.termination.spent-limit=30s

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
