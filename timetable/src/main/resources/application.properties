# ===== CEID Timetable Configuration =====

spring.application.name=ceid-timetable
server.port=8080

# ===== PostgreSQL Database =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ceid_timetable}
spring.datasource.username=${DB_USERNAME:ceid_admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# Το σχήμα το διαχειρίζεται ΑΠΟΚΛΕΙΣΤΙΚΑ το Flyway (βλ. παρακάτω). Το Hibernate
# μόνο επαληθεύει (validate) ότι τα entities ταιριάζουν με το σχήμα — δεν το αλλάζει.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Flyway (schema migrations) =====
# Κάθε αλλαγή σχήματος = νέο versioned migration (Vx__desc.sql) στο
# classpath:db/migration. ΠΟΤΕ μην επεξεργάζεσαι ήδη εφαρμοσμένα migrations.
spring.flyway.enabled=true
# Υπάρχουσες (μη-κενές) βάσεις χωρίς ιστορικό Flyway: γίνονται baseline στην
# έκδοση 1 (το V1 ΔΕΝ ξανατρέχει — το σχήμα υπάρχει ήδη). Κενές βάσεις (CI):
# εκτελείται το V1 και χτίζεται το σχήμα από την αρχή.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing schema baseline

# ===== Server =====
spring.jpa.open-in-view=false

# ===== JWT =====
# Ορίσου στο περιβάλλον ως: setx JWT_SECRET "your-secret-here"  (Windows)
# ή export JWT_SECRET="your-secret-here"  (Linux/macOS)
# Το default χρησιμοποιείται ΜΟΝΟ για τοπική ανάπτυξη (dev).
# ΣΕ ΠΑΡΑΓΩΓΗ: πάντα ορίζε το JWT_SECRET env var, ΜΗΝ αφήνεις default!
jwt.secret=${JWT_SECRET:ceid-timetable-dev-secret-key-32-chars-min}

# ===== Timefold Solver =====
spring.autoconfigure.exclude=ai.timefold.solver.spring.boot.autoconfigure.TimefoldSolverAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
timefold.solver.termination.spent-limit=30s

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
