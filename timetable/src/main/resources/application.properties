# ===== CEID Timetable Configuration =====

spring.application.name=ceid-timetable
server.port=8080

# ===== PostgreSQL Database =====
spring.datasource.url=jdbc:postgresql://localhost:5432/ceid_timetable
spring.datasource.username=ceid_admin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Server =====
spring.jpa.open-in-view=false

# Timefold Solver
spring.autoconfigure.exclude=ai.timefold.solver.spring.boot.autoconfigure.TimefoldSolverAutoConfiguration
timefold.solver.termination.spent-limit=30s